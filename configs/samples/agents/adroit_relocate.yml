obj: maxentirl_sa
IS: false
seed: 1
cuda: 0
env:
  env_name: relocate-expert-v1
  T: 1000  # 1000
  state_indices: all
  max_ep_len: 200
irl:
  training_trajs: 8
  n_itrs: 1000 # 1.3M steps in total
  save_interval: 0
  eval_episodes: 1
  expert_episodes: 1
  resample_episodes: 10
bc:
  epochs: 10000
  eval_freq: 100
  eval_episodes: 20
  expert_episodes: 16
sac:
  k: 1
  epochs: 5 # 5
  log_step_interval: 5000
  update_every: 1
  random_explore_episodes: 1
  update_num: 1
  batch_size: 200
  lr: 0.001
  alpha: 0.2
  automatic_alpha_tuning: True
  buffer_size: 1000000
  num_test_episodes: 2
  reinitialize: false
  weight_decay: 1e-3
reward:
  use_bn: false
  residual: false
  hid_act: relu
  hidden_sizes: [512, 512]
  clamp_magnitude: 10
  lr: 0.0001
  weight_decay: 2e-4
  gradient_step: 1
  momentum: 0.9
  alpha: 0.1
  num_epochs: 700
  batch_size: 256
disc:
  reinit: false
  model_type: resnet_disc
  num_layer_blocks: 6
  hid_dim: 128
  hid_act: tanh
  use_bn: false
  clamp_magnitude: 10.0
  batch_size: 800
  lr: 0.0003
  weight_decay: 0.0001
  momentum: 0.9
  iter: 1200
critic:
  lam: 0.5
  model_type: resnet_disc
  num_layer_blocks: 3
  hid_dim: 128
  hid_act: tanh
  use_bn: false
  batch_size: 800
  lr: 0.0003
  weight_decay: 0.0001
  momentum: 0.0
  iter: 1200
adv_irl: # https://github.com/KamyarGh/rl_swiss/blob/master/exp_specs/adv_irl.yaml
  normalize: true
  num_epochs: 100
  num_steps_per_epoch: 100000
  num_steps_between_train_calls: 1000
  min_steps_before_training: 5000
  num_update_loops_per_train_call: 100
  num_disc_updates_per_loop_iter: 1
  num_policy_updates_per_loop_iter: 1
  disc_optim_batch_size: 256
  policy_optim_batch_size: 256
  disc_lr: 0.0003
  disc_momentum: 0.0
  use_grad_pen: true
  grad_pen_weight: 4.0  # [2.0, 4.0, 8.0, 16.0]
  reward_scale: 0.2  # [2.0, 4.0, 8.0, 16.0]
  save_interval: 0
  eval_interval: 200
  replay_buffer_size: 200000
  disc:
    model_type: mlp_disc
    num_layer_blocks: 2
    hid_dim: 128
    hid_act: tanh
    use_bn: false
    clamp_magnitude: 10.0
